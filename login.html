<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopNow</title>
  <link rel="stylesheet" href="login.css" />
</head>
<body>
  <div id="authView" class="auth-view">
    <div class="auth-card">
      <div class="brand">
        <h1>ShopNow</h1>
        <p>Login or create an account to start shopping.</p>
      </div>

      <div class="tabs">
        <button id="loginTab" class="tab active">Login</button>
        <button id="signupTab" class="tab">Sign Up</button>
      </div>

      <form id="loginForm" class="form active">
        <h2>Login</h2>
        <input type="email" id="loginEmail" placeholder="Email" required />
        <input type="password" id="loginPassword" placeholder="Password" required />
        <button type="submit" class="btn"><a href="index.html">Login</a></button>
        <p class="msg" id="loginMsg"></p>
      </form>

      <form id="signupForm" class="form">
        <h2>Sign Up</h2>
        <input type="text" id="signupName" placeholder="Full Name" required />
        <input type="email" id="signupEmail" placeholder="Email" required />
        <input type="password" id="signupPassword" placeholder="Password" required />
        <button type="submit" class="btn">Create Account</button>
        <p class="msg" id="signupMsg"></p>
      </form>
    </div>
  </div>
